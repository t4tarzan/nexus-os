<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      background: #0a0a0f;
      color: #e2e2f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px;
    }
    h2 {
      font-size: 14px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h2 span { color: #6c5ce7; font-size: 18px; }
    textarea {
      width: 100%;
      height: 100px;
      background: #14141f;
      border: 1px solid #1e1e2e;
      border-radius: 8px;
      color: #e2e2f0;
      padding: 10px;
      font-size: 13px;
      resize: vertical;
      margin-bottom: 10px;
    }
    textarea:focus { outline: none; border-color: #6c5ce7; }
    .actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .action-btn {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid #1e1e2e;
      background: #14141f;
      color: #6b6b80;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-btn:hover { border-color: #6c5ce7; color: #e2e2f0; background: #6c5ce710; }
    .action-btn.active { border-color: #6c5ce7; color: #6c5ce7; background: #6c5ce720; }
    button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #6c5ce7;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { background: #7c6cf7; }
    button:disabled { opacity: 0.4; cursor: default; }
    #status {
      margin-top: 8px;
      font-size: 11px;
      color: #6b6b80;
      min-height: 16px;
    }
    #status.success { color: #00d68f; }
    #status.error { color: #ff3d71; }
  </style>
</head>
<body>
  <h2><span>🧠</span> Send to Nexus</h2>
  
  <textarea id="text" placeholder="Selected text or type here..."></textarea>
  
  <div class="actions">
    <button class="action-btn" data-action="summarize">📝 Summarize</button>
    <button class="action-btn" data-action="explain">💡 Explain</button>
    <button class="action-btn" data-action="save">💾 Save Note</button>
    <button class="action-btn" data-action="ask">❓ Ask about this</button>
  </div>
  
  <button id="send">Send to Nexus</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
